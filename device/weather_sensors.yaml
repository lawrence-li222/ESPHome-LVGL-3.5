# ============================================================
# weather_sensors.yaml  –  slim on_value, script does the UI
# ============================================================

sensor:
  - platform: homeassistant
    id: ha_temperature
    entity_id: ${weather_entity}
    attribute: temperature
    on_value:
      - script.execute: refresh_ui_weather   # script reads .state

  - platform: homeassistant
    id: ha_feels_like
    entity_id: ${weather_entity}
    attribute: apparent_temperature
    on_value:
      - script.execute: refresh_ui_weather

  - platform: homeassistant
    id: ha_humidity
    entity_id: ${weather_entity}
    attribute: humidity
    on_value:
      - script.execute: refresh_ui_weather

  - platform: homeassistant
    id: ha_wind_speed
    entity_id: ${weather_entity}
    attribute: wind_speed
    on_value:
      - script.execute: refresh_ui_weather

  - platform: homeassistant
    id: ha_wind_bearing
    entity_id: ${weather_entity}
    attribute: wind_bearing
    on_value:
      - script.execute: refresh_ui_weather

  - platform: homeassistant
    id: ha_precipitation
    entity_id: ${weather_entity}
    attribute: precipitation
    on_value:
      - script.execute: refresh_ui_weather

  - platform: homeassistant
    id: ha_pressure
    entity_id: ${weather_entity}
    attribute: pressure
    on_value:
      - script.execute: refresh_ui_weather

  - platform: homeassistant
    id: ha_visibility
    entity_id: ${weather_entity}
    attribute: visibility
    on_value:
      - script.execute: refresh_ui_weather

text_sensor:
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: ${weather_entity}
    on_value:
      # Save to global so the script can access it later
      - lambda: id(weather_condition) = x.c_str();
      - script.execute: refresh_ui_weather