substitutions:
  # Weather sensor update interval (ms)
  weather_info: weather.forecast_home

# ============================================================
# weather_sensors.yaml
# ESPHome package – Home Assistant weather sensors
# Include via: packages: weather: !include weather_sensors.yaml
# ============================================================

sensor:

  # ── Temperature ───────────────────────────────────────
  - platform: homeassistant
    id: ha_temperature
    entity_id: ${weather_info}               # ← your HA weather entity
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: weather_temp_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--°");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.1f°", x);
            return std::string(buf);
      # Mirror to detail page
      - lvgl.label.update:
          id: weather_temp_detail_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--°");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.1f°", x);
            return std::string(buf);

  # ── Feels Like ────────────────────────────────────────
  - platform: homeassistant
    id: ha_feels_like
    entity_id: ${weather_info}
    attribute: apparent_temperature
    on_value:
      - lvgl.label.update:
          id: weather_feels_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--°");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.1f°", x);
            return std::string(buf);
      - lvgl.label.update:
          id: weather_feels_detail_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--°");
            char buf[10];
            snprintf(buf, sizeof(buf), "%.1f°", x);
            return std::string(buf);

  # ── Humidity ──────────────────────────────────────────
  - platform: homeassistant
    id: ha_humidity
    entity_id: ${weather_info}
    attribute: humidity
    on_value:
      - lvgl.label.update:
          id: weather_humidity_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--%");
            char buf[10];
            snprintf(buf, sizeof(buf), "%d%%", (int)x);
            return std::string(buf);
      - lvgl.label.update:
          id: weather_humidity_detail_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--%");
            char buf[10];
            snprintf(buf, sizeof(buf), "%d%%", (int)x);
            return std::string(buf);

  # ── Wind Speed ────────────────────────────────────────
  - platform: homeassistant
    id: ha_wind_speed
    entity_id: ${weather_info}
    attribute: wind_speed
    on_value:
      - lvgl.label.update:
          id: weather_wind_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("-- km/h");
            char buf[16];
            snprintf(buf, sizeof(buf), "%d km/h", (int)x);
            return std::string(buf);

  # ── Precipitation ─────────────────────────────────────
  - platform: homeassistant
    id: ha_precipitation
    entity_id: ${weather_info}
    attribute: precipitation
    on_value:
      - lvgl.label.update:
          id: weather_precip_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("-- mm");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.1f mm", x);
            return std::string(buf);

  # ── Wind Bearing (degrees) ────────────────────────────
  - platform: homeassistant
    id: ha_wind_bearing
    entity_id: ${weather_info}
    attribute: wind_bearing
    on_value:
      - lvgl.label.update:
          id: weather_wind_dir_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("--");
            // Convert degrees to cardinal direction
            const char* dirs[] = {
              "N","NNE","NE","ENE","E","ESE","SE","SSE",
              "S","SSW","SW","WSW","W","WNW","NW","NNW"
            };
            int idx = (int)((x + 11.25) / 22.5) % 16;
            return std::string(dirs[idx]);

  # ── Visibility ────────────────────────────────────────
  - platform: homeassistant
    id: ha_visibility
    entity_id: ${weather_info}
    attribute: visibility
    on_value:
      - lvgl.label.update:
          id: weather_visibility_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("-- km");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f km", x);
            return std::string(buf);

  # ── Pressure ──────────────────────────────────────────
  - platform: homeassistant
    id: ha_pressure
    entity_id: ${weather_info}
    attribute: pressure
    on_value:
      - lvgl.label.update:
          id: weather_pressure_lbl
          text: !lambda |-
            if (isnan(x)) return std::string("-- hPa");
            char buf[16];
            snprintf(buf, sizeof(buf), "%.0f hPa", x);
            return std::string(buf);

# ── Condition (text state) ────────────────────────────────
text_sensor:
  - platform: homeassistant
    id: ha_weather_condition
    entity_id: ${weather_info}               # ← your HA weather entity
    on_value:
      # Map HA condition string → MDI glyph + accent colour
      - lambda: |-
          struct WeatherMap {
            const char* condition;
            const char* glyph;
            lv_color_t  color;
          };
          static const WeatherMap wmap[] = {
            { "clear-night",        "\U000F0594", lv_color_hex(0x7986CB) },
            { "cloudy",             "\U000F0590", lv_color_hex(0x90A4AE) },
            { "exceptional",        "\U000F059C", lv_color_hex(0xEF5350) },
            { "fog",                "\U000F0591", lv_color_hex(0xB0BEC5) },
            { "hail",               "\U000F0592", lv_color_hex(0x80DEEA) },
            { "lightning",          "\U000F0593", lv_color_hex(0xFFD54F) },
            { "lightning-rainy",    "\U000F067E", lv_color_hex(0xFFD54F) },
            { "partlycloudy",       "\U000F0595", lv_color_hex(0x90CAF9) },
            { "partly-lightning",   "\U000F0F37", lv_color_hex(0xFFD54F) },
            { "partly-rainy",       "\U000F0F38", lv_color_hex(0x64B5F6) },
            { "partly-snowy",       "\U000F0F35", lv_color_hex(0xE0F7FA) },
            { "partly-snowy-rainy", "\U000F0F34", lv_color_hex(0xB3E5FC) },
            { "pouring",            "\U000F0596", lv_color_hex(0x42A5F5) },
            { "rainy",              "\U000F0597", lv_color_hex(0x64B5F6) },
            { "snowy",              "\U000F0598", lv_color_hex(0xE3F2FD) },
            { "snowy-rainy",        "\U000F067F", lv_color_hex(0xB3E5FC) },
            { "sunny",              "\U000F0599", lv_color_hex(0xFFD54F) },
            { "tornado",            "\U000F059B", lv_color_hex(0xCE93D8) },
            { "windy",              "\U000F059D", lv_color_hex(0x80CBC4) },
            { "windy-variant",      "\U000F059E", lv_color_hex(0x80CBC4) },
          };
          const char* glyph = "\U000F0595";           // fallback: partly-cloudy
          lv_color_t col    = lv_color_hex(0x90A4AE);
          for (auto& m : wmap) {
            if (x == m.condition) { glyph = m.glyph; col = m.color; break; }
          }
          auto *obj = id(weather_icon_lbl);
          lv_label_set_text(obj, glyph);
          lv_obj_set_style_text_color(obj, col, LV_PART_MAIN | LV_STATE_DEFAULT);
      # Human-readable condition e.g. "Partly cloudy"
      - lambda: |-
          std::string pretty = x;
          for (char& c : pretty) if (c == '-') c = ' ';
          if (!pretty.empty()) pretty[0] = toupper(pretty[0]);
          id(weather_condition_lbl)->setText(pretty.c_str());