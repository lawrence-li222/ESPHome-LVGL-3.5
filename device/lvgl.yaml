substitutions:
  fan: fan.guest_bedroom_left_ceilng_fan      # must match ha_fan.yaml

  # ── Colours (tweak here, applied everywhere) ──────────────────────────────
  color_bg:         "0x0D0D1A"
  color_header:     "0x1A1A2E"
  color_accent:     "0x00BFFF"
  color_track:      "0x2A2A3E"
  color_knob:       "0xFFFFFF"
  color_btn_preset: "0x1E3A5F"
  color_btn_on:     "0x007700"
  color_btn_off:    "0xCC3300"
  color_dot_off:    "0x444444"
  color_muted:      "0x888888"
  color_subtle:     "0xAAAAAA"
  color_white:      "0xFFFFFF"
  color_shadow:     "0xA6A6A6"

lvgl:
  buffer_size: 100%
  top_layer:
    widgets:
    
      # =========================================================================
      # TEMPERATURE DISPLAY (Top-left corner of screen)
      # =========================================================================
      # WHAT IT SHOWS:
      #   Displays two temperatures: "outdoor° / indoor°"
      #   Example: "15° / 22°" means 15°C outside, 22°C in the office
      #
      # WHERE THE DATA COMES FROM (defined in sensors.yaml):
      #   - Left number: sensor.outdoor_temperature (weather/outdoor sensor)
      #   - Right number: sensor.office_temperature (indoor room sensor)
      #
      # HOW IT UPDATES:
      #   When either temperature sensor changes in Home Assistant, the
      #   sensors.yaml file triggers an update to this label's text.
      # =========================================================================
      - label:
          text: "-° / -°"
          id: temperatures
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      # =========================================================================
      # CLOCK DISPLAY (Top-center of screen)
      # =========================================================================
      # WHAT IT SHOWS:
      #   Current time in 24-hour format (e.g., "14:30")
      #
      # WHERE THE DATA COMES FROM:
      #   The time component (configured in addon/time.yaml) syncs with
      #   Home Assistant's time and updates this label every minute.
      # =========================================================================
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: top_mid
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      # layout: 
      #   type: grid
      #   grid_columns: [fr(1), fr(1)]
      #   grid_rows: [fr(1), fr(1), fr(1)]
      # scrollbar_mode: "off"
      # scroll_dir: "hor"
      # width: 100%
      bg_color: Black
      # bg_opa: cover
      # pad_top: 34
      # pad_bottom: 5
      # pad_left: 5
      # pad_right: 5
      
      widgets:
       
        - slider:
            id: fan_speed_slider
            width: 50%
            height: 12
            x: 80
            y: 70
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_track}
            radius: 6
            shadow_width: 4
            shadow_color: ${color_shadow}
            indicator:
              bg_color: ${color_accent}
              radius: 6
            knob:
              bg_color: ${color_knob}
              width: 28
              height: 28
              radius: 14
              shadow_width: 8
              shadow_color: ${color_accent}
            
            # Optional: Add padding for the knob
            pad_all: 10
            on_value:
              then:
                - homeassistant.service:
                    service: fan.set_percentage
                    data:
                      entity_id: ${fan}
                      percentage: !lambda return x;

        
        # ── Speed readout ────────────────────────────────────────────────────
        - label:
            id: office_ceiling_fan_speed_label
            text: "0%"
            x: 350
            y: 65
            text_font: montserrat_18
            text_color: ${color_accent}
            bg_color: 0x000000
            bg_opa: 50%
            shadow_width: 4
            shadow_color: ${color_shadow}

        - label:
            text: "Speed"
            x: 400
            y: 40
            text_font: montserrat_16
            text_color: ${color_muted}
            # shadow_width: 2
            # shadow_color: ${color_shadow}

        # ── Animated Fan Icon ─────────────────────────────────────────────────
        - label:
            id: fan_icon
            text: ${fan}
            x: 20
            y: 50
            text_font: icon_font
            text_color: ${color_accent}
            shadow_width: 4
            shadow_color: ${color_shadow}
            on_click:
              then:
                - homeassistant.service:
                    service: fan.toggle
                    data:
                      entity_id: ${fan}

  animations:
    - id: fan_rotation
      widget: fan_icon
      property: rotation
      start_value: 0
      end_value: 360
      duration: 1000
      repeat: true
      direction: normal
      path: linear
      delay: 0
            
       