substitutions:
  ceiling_fan: fan.office_ceiling_fan      # must match ha_fan.yaml

  # ── Colours (tweak here, applied everywhere) ──────────────────────────────
  color_bg:         "0x0D0D1A"
  color_header:     "0x1A1A2E"
  color_accent:     "0x00BFFF"
  color_track:      "0x2A2A3E"
  color_knob:       "0xFFFFFF"
  color_btn_preset: "0x1E3A5F"
  color_btn_on:     "0x007700"
  color_btn_off:    "0xCC3300"
  color_dot_off:    "0x444444"
  color_muted:      "0x888888"
  color_subtle:     "0xAAAAAA"
  color_white:      "0xFFFFFF"
  color_shadow:     "0xA6A6A6"

lvgl:
  buffer_size: 100%
  top_layer:
    widgets:
    
      # =========================================================================
      # TEMPERATURE DISPLAY (Top-left corner of screen)
      # =========================================================================
      # WHAT IT SHOWS:
      #   Displays two temperatures: "outdoor° / indoor°"
      #   Example: "15° / 22°" means 15°C outside, 22°C in the office
      #
      # WHERE THE DATA COMES FROM (defined in sensors.yaml):
      #   - Left number: sensor.outdoor_temperature (weather/outdoor sensor)
      #   - Right number: sensor.office_temperature (indoor room sensor)
      #
      # HOW IT UPDATES:
      #   When either temperature sensor changes in Home Assistant, the
      #   sensors.yaml file triggers an update to this label's text.
      # =========================================================================
      - label:
          text: "-° / -°"
          id: weather_temp_lbl
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          id: weather_icon_lbl
          align: TOP_MID
          y: 6
          text: "\U000F0595"        # default: partly-cloudy
          text_font: mdi_48
          text_color: 0x90CAF9

      # =========================================================================
      # CLOCK DISPLAY (Top-center of screen)
      # =========================================================================
      # WHAT IT SHOWS:
      #   Current time in 24-hour format (e.g., "14:30")
      #
      # WHERE THE DATA COMES FROM:
      #   The time component (configured in addon/time.yaml) syncs with
      #   Home Assistant's time and updates this label every minute.
      # =========================================================================
      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: TOP_RIGHT
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      # layout: 
      #   type: grid
      #   grid_columns: [fr(1), fr(1)]
      #   grid_rows: [fr(1), fr(1), fr(1)]
      # scrollbar_mode: "off"
      # scroll_dir: "hor"
      # width: 100%
      bg_color: Black
      # bg_opa: cover
      # pad_top: 34
      # pad_bottom: 5
      # pad_left: 5
      # pad_right: 5
      
      widgets:
        - label:
            id: fan_icon_lbl
            x: 10
            y: 45
            text: "\U000F0210"       # mdi:fan glyph
            text_font: mdi_56
            text_color: 0x546E7A    # starts grey (off)
            # Pivot at icon centre so it spins in place
            transform_pivot_x: 28
            transform_pivot_y: 28
            transform_angle: 0

        - slider:
            id: fan_speed_slider
            width: 50%
            height: 12
            x: 80
            y: 70
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_track}
            radius: 6
            shadow_width: 4
            shadow_color: ${color_shadow}
            indicator:
              bg_color: ${color_accent}
              radius: 6
            knob:
              bg_color: ${color_knob}
              width: 28
              height: 28
              radius: 14
              shadow_width: 8
              shadow_color: ${color_accent}
            on_value:
              then:
                - lvgl.label.update:
                    id: fan_speed_label
                    text: !lambda |-
                      return std::to_string((int)x) + "%";
            on_release:
              then:
                - logger.log:
                    format: "Fan slider released: %.0f%%"
                    args: [x]
                - homeassistant.service:
                    service: fan.set_percentage
                    data:
                      entity_id: ${ceiling_fan}          # ← same entity as in sensors.yaml
                      percentage: !lambda "return (int)x;"
                
        # ── Speed readout ────────────────────────────────────────────────────
        - label:
            id: fan_speed_label
            text: "0%"
            x: 340
            y: 70
            text_font: montserrat_18
            text_color: ${color_accent}
            bg_color: 0x000000
            bg_opa: 50%
            shadow_width: 4
            shadow_color: ${color_shadow}

        - label:
            text: "Speed"
            x: 400
            y: 65
            text_font: montserrat_16
            text_color: ${color_muted}
            # shadow_width: 2
            # shadow_color: ${color_shadow}
        - button:
            id: fan_btn_toggle
            x: 200
            y: 150
            height: $button_height_single
            width: $button_width
            bg_color: ${color_btn_on}
            radius: 18
            widgets:
              - label:
                  text: "  Fan On"
                  text_color: ${color_white}
                  text_font: montserrat_14
            on_click:
              then:
                - if:
                    condition:
                      binary_sensor.is_on: ha_fan_state
                    then:
                      - homeassistant.service:
                          service: fan.turn_off
                          data:
                            entity_id: ${ceiling_fan}
                    else:
                      - homeassistant.service:
                          service: fan.turn_on
                          data:
                            entity_id: ${ceiling_fan}

# ─── Animation interval ───────────────────────────────────
# Runs every 40 ms (~25 fps). Advances angle only while fan is ON.
interval:
  - interval: 10ms
    then:
      - if:
          condition:
            lambda: return id(fan_on);
          then:
            - lambda: |-
                id(fan_angle) = (id(fan_angle) + 15) % 3600;  // 15 = speed
            - lvgl.widget.update:
                id: fan_icon_lbl
                transform_angle: !lambda return id(fan_angle);
  