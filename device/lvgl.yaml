      widgets:
      
        - slider:
            id: fan_speed_slider
            width: 100
            height: 280
            x: 20
            y: 50
            styles: control
            radius: 0
            knob:
              radius: 1
              width: 4
              height: 5%
            min_value: 0
            max_value: 100
            value: 50
            # Optional: Add padding for the knob
            pad_all: 10
            
        
