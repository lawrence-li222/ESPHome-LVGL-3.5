substitutions:
  ceiling_fan: fan.office_ceiling_fan      # must match ha_fan.yaml

  # ── Colours (tweak here, applied everywhere) ──────────────────────────────
  color_bg:         "0x0D0D1A"
  color_header:     "0x1A1A2E"
  color_accent:     "0x00BFFF"
  color_track:      "0x2A2A3E"
  color_knob:       "0xFFFFFF"
  color_btn_preset: "0x1E3A5F"
  color_btn_on:     "0x007700"
  color_btn_off:    "0x333333"
  color_dot_off:    "0x444444"
  color_muted:      "0x888888"
  color_subtle:     "0xAAAAAA"
  color_white:      "0xFFFFFF"
  color_shadow:     "0xA6A6A6"

lvgl:
  buffer_size: 100%
  top_layer:
    widgets:
    
      - label:
          text: "-° / -°"
          id: weather_temp_lbl
          styles: roboto15_style
          align: top_left
          x: 8
          y: 4
          text_color: 0xFFFFFF

      - label:
          id: weather_icon_lbl
          align: TOP_MID
          y: 6
          text: "\U000F0595"        # default: partly-cloudy
          text_font: mdi_48
          text_color: 0x90CAF9

      - label:
          text: "--:--"
          id: display_time
          styles: roboto15_style
          align: TOP_RIGHT
          x: 0
          y: 4
          text_align: center
          text_color: 0xFFFFFF
          
  pages:
    - id: main_page
      layout: 
        type: grid
        grid_columns: [fr(1), fr(3), fr(1)]
        grid_rows: [fr(1), fr(1), fr(1)]
      pad_top: 50
      pad_left: 20
      pad_right: 20
      bg_color: Black
      
      widgets:
        - button:
            id: fan_btn_toggle
            grid_cell_column_pos: 0
            grid_cell_row_pos: 0
            height: $button_height_single
            width: $button_width
            bg_color: ${color_btn_on}
            radius: 18
            widgets:
              # - label:
              #     id: fan_btn_state_lbl
              #     text: "  Fan On"
              #     text_color: ${color_white}
              #     text_font: montserrat_14
              - label:
                  id: fan_icon_lbl
                  align: CENTER
                  text: "\U000F0210"       # mdi:fan glyph
                  text_font: mdi_56
                  text_color: 0x546E7A    # starts grey (off)
                  # Pivot at icon centre so it spins in place
                  transform_pivot_x: 28
                  transform_pivot_y: 28
                  transform_angle: 0
            on_click:
              then:
                - if:
                    condition:
                      binary_sensor.is_on: ha_fan_state
                    then:
                      - homeassistant.service:
                          service: fan.turn_off
                          data:
                            entity_id: ${ceiling_fan}
                    else:
                      - homeassistant.service:
                          service: fan.turn_on
                          data:
                            entity_id: ${ceiling_fan}
        - slider:
            id: fan_speed_slider
            grid_cell_column_pos: 1
            grid_cell_row_pos: 0
            grid_cell_x_align: CENTER
            grid_cell_y_align: CENTER
            width: 50%
            height: 12
            min_value: 0
            max_value: 100
            value: 0
            bg_color: ${color_track}
            radius: 6
            shadow_width: 4
            shadow_color: ${color_shadow}
            indicator:
              bg_color: ${color_accent}
              radius: 6
            knob:
              bg_color: ${color_knob}
              width: 28
              height: 28
              radius: 14
              shadow_width: 8
              shadow_color: ${color_accent}
            on_value:
              then:
                - lvgl.label.update:
                    id: fan_speed_label
                    text: !lambda |-
                      return std::to_string((int)x) + "%";
            on_release:
              then:
                - logger.log:
                    format: "Fan slider released: %.0f%%"
                    args: [x]
                - homeassistant.service:
                    service: fan.set_percentage
                    data:
                      entity_id: ${ceiling_fan}          # ← same entity as in sensors.yaml
                      percentage: !lambda "return (int)x;"
                
        # ── Speed readout ────────────────────────────────────────────────────
        - label:
            id: fan_speed_label
            grid_cell_column_pos: 2
            grid_cell_row_pos: 0
            grid_cell_x_align: CENTER
            grid_cell_y_align: CENTER
            text: "0%"
            text_font: montserrat_18
            text_color: ${color_accent}
            bg_color: 0x000000
            bg_opa: 50%
            shadow_width: 4
            shadow_color: ${color_shadow}

    
        
# ─── Animation interval ───────────────────────────────────
# Runs every 40 ms (~25 fps). Advances angle only while fan is ON.
interval:
  - interval: 10ms
    then:
      - if:
          condition:
            lambda: return id(fan_on);
          then:
            - lambda: |-
                id(fan_angle) = (id(fan_angle) + 15) % 3600;  // 15 = speed
            - lvgl.widget.update:
                id: fan_icon_lbl
                transform_angle: !lambda return id(fan_angle);
  