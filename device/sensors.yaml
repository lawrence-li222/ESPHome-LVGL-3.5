substitutions:
  ceiling_fan: fan.office_ceiling_fan      # must match ha_fan.yaml

# ─── Home Assistant sensors ───────────────────────────────
binary_sensor:
  - platform: homeassistant
    id: ha_fan_state
    entity_id: ${ceiling_fan}          # ← change to your fan entity
    on_state:
      - lambda: id(fan_on) = x;
      - if:
          condition:
            lambda: return x;
          then:
            # Fan turned ON – blue icon + "Running" label
            - lvgl.widget.update:
                id: fan_icon_lbl
                text_color: 0x29B6F6
          else:
            # Fan turned OFF – grey icon + "Off" label, reset angle
            - globals.set:
                id: fan_angle
                value: "0"
            - lvgl.widget.update:
                id: fan_icon_lbl
                text_color: 0x546E7A
                transform_angle: 0
            
sensor:
  - platform: homeassistant
    id: ha_fan_speed
    entity_id: ${ceiling_fan}          # ← same entity
    attribute: percentage
    on_value:
      - lvgl.label.update:
          id: fan_speed_label
          text: !lambda |-
            if (isnan(x)) return std::string("--");
            return std::to_string((int)x) + "%";

   