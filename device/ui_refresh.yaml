# ============================================================
# ui_refresh.yaml
# Centralised UI update script – call any time to sync all
# LVGL labels from current sensor values in memory.
# ============================================================

script:

  # ── Master UI refresh ────────────────────────────────────
  # Reads every sensor/global currently in memory and writes
  # the formatted value directly to the matching LVGL label.
  # Safe to call at any time – NaN values show "--".
  - id: refresh_ui_all
    mode: single             # ignore re-triggers while running
    then:
      - script.execute: refresh_ui_weather
      - script.execute: refresh_ui_fan

  # ── Weather labels ────────────────────────────────────────
  - id: refresh_ui_weather
    mode: single
    then:
      # Temperature
      - lvgl.label.update:
          id: weather_temp_lbl
          text: !lambda |-
            float v = id(ha_temperature).state;
            if (isnan(v)) return std::string("--°");
            char buf[10]; snprintf(buf, sizeof(buf), "%.1f°", v);
            return std::string(buf);
      - lvgl.label.update:
          id: weather_temp_detail_lbl
          text: !lambda |-
            float v = id(ha_temperature).state;
            if (isnan(v)) return std::string("--°");
            char buf[10]; snprintf(buf, sizeof(buf), "%.1f°", v);
            return std::string(buf);

      # Feels like
      - lvgl.label.update:
          id: weather_feels_lbl
          text: !lambda |-
            float v = id(ha_feels_like).state;
            if (isnan(v)) return std::string("--°");
            char buf[10]; snprintf(buf, sizeof(buf), "%.1f°", v);
            return std::string(buf);
      - lvgl.label.update:
          id: weather_feels_detail_lbl
          text: !lambda |-
            float v = id(ha_feels_like).state;
            if (isnan(v)) return std::string("--°");
            char buf[10]; snprintf(buf, sizeof(buf), "%.1f°", v);
            return std::string(buf);

      # Humidity
      - lvgl.label.update:
          id: weather_humidity_lbl
          text: !lambda |-
            float v = id(ha_humidity).state;
            if (isnan(v)) return std::string("--%");
            char buf[10]; snprintf(buf, sizeof(buf), "%d%%", (int)v);
            return std::string(buf);
      - lvgl.label.update:
          id: weather_humidity_detail_lbl
          text: !lambda |-
            float v = id(ha_humidity).state;
            if (isnan(v)) return std::string("--%");
            char buf[10]; snprintf(buf, sizeof(buf), "%d%%", (int)v);
            return std::string(buf);

      # Wind speed
      - lvgl.label.update:
          id: weather_wind_lbl
          text: !lambda |-
            float v = id(ha_wind_speed).state;
            if (isnan(v)) return std::string("-- km/h");
            char buf[16]; snprintf(buf, sizeof(buf), "%d km/h", (int)v);
            return std::string(buf);

      # Wind direction
      - lvgl.label.update:
          id: weather_wind_dir_lbl
          text: !lambda |-
            float v = id(ha_wind_bearing).state;
            if (isnan(v)) return std::string("--");
            const char* dirs[] = {
              "N","NNE","NE","ENE","E","ESE","SE","SSE",
              "S","SSW","SW","WSW","W","WNW","NW","NNW"
            };
            int idx = (int)((v + 11.25) / 22.5) % 16;
            return std::string(dirs[idx]);

      # Precipitation
      - lvgl.label.update:
          id: weather_precip_lbl
          text: !lambda |-
            float v = id(ha_precipitation).state;
            if (isnan(v)) return std::string("-- mm");
            char buf[16]; snprintf(buf, sizeof(buf), "%.1f mm", v);
            return std::string(buf);

      # Pressure
      - lvgl.label.update:
          id: weather_pressure_lbl
          text: !lambda |-
            float v = id(ha_pressure).state;
            if (isnan(v)) return std::string("-- hPa");
            char buf[16]; snprintf(buf, sizeof(buf), "%.0f hPa", v);
            return std::string(buf);

      # Visibility
      - lvgl.label.update:
          id: weather_visibility_lbl
          text: !lambda |-
            float v = id(ha_visibility).state;
            if (isnan(v)) return std::string("-- km");
            char buf[16]; snprintf(buf, sizeof(buf), "%.0f km", v);
            return std::string(buf);

      # Condition icon + text (from stored global string)
      - lambda: |-
          struct WeatherMap {
            const char* condition;
            const char* glyph;
            lv_color_t  color;
          };
          static const WeatherMap wmap[] = {
            { "clear-night",        "\U000F0594", lv_color_hex(0x7986CB) },
            { "cloudy",             "\U000F0590", lv_color_hex(0x90A4AE) },
            { "exceptional",        "\U000F059C", lv_color_hex(0xEF5350) },
            { "fog",                "\U000F0591", lv_color_hex(0xB0BEC5) },
            { "hail",               "\U000F0592", lv_color_hex(0x80DEEA) },
            { "lightning",          "\U000F0593", lv_color_hex(0xFFD54F) },
            { "lightning-rainy",    "\U000F067E", lv_color_hex(0xFFD54F) },
            { "partlycloudy",       "\U000F0595", lv_color_hex(0x90CAF9) },
            { "partly-lightning",   "\U000F0F37", lv_color_hex(0xFFD54F) },
            { "partly-rainy",       "\U000F0F38", lv_color_hex(0x64B5F6) },
            { "partly-snowy",       "\U000F0F35", lv_color_hex(0xE0F7FA) },
            { "partly-snowy-rainy", "\U000F0F34", lv_color_hex(0xB3E5FC) },
            { "pouring",            "\U000F0596", lv_color_hex(0x42A5F5) },
            { "rainy",              "\U000F0597", lv_color_hex(0x64B5F6) },
            { "snowy",              "\U000F0598", lv_color_hex(0xE3F2FD) },
            { "snowy-rainy",        "\U000F067F", lv_color_hex(0xB3E5FC) },
            { "sunny",              "\U000F0599", lv_color_hex(0xFFD54F) },
            { "tornado",            "\U000F059B", lv_color_hex(0xCE93D8) },
            { "windy",              "\U000F059D", lv_color_hex(0x80CBC4) },
            { "windy-variant",      "\U000F059E", lv_color_hex(0x80CBC4) },
          };
          std::string cond = id(weather_condition);  // from global
          const char* glyph = "\U000F0595";
          lv_color_t col    = lv_color_hex(0x90A4AE);
          for (auto& m : wmap) {
            if (cond == m.condition) { glyph = m.glyph; col = m.color; break; }
          }
          // Update icon
          lv_label_set_text(id(weather_icon_lbl), glyph);
          lv_obj_set_style_text_color(id(weather_icon_lbl), col,
                                      LV_PART_MAIN | LV_STATE_DEFAULT);
          // Update condition text
          std::string pretty = cond;
          for (char& c : pretty) if (c == '-') c = ' ';
          if (!pretty.empty()) pretty[0] = toupper(pretty[0]);
          lv_label_set_text(id(weather_condition_lbl), pretty.c_str());

  # ── Fan labels ────────────────────────────────────────────
  - id: refresh_ui_fan
    mode: single
    then:
      # Fan on/off state
      - lambda: |-
          bool on = id(fan_on);
          // Icon colour
          lv_obj_set_style_text_color(
            id(fan_icon_lbl),
            on ? lv_color_hex(0x29B6F6) : lv_color_hex(0x546E7A),
            LV_PART_MAIN | LV_STATE_DEFAULT);
          // State label
          lv_label_set_text(id(fan_state_lbl), on ? "Running" : "Off");
          lv_obj_set_style_text_color(
            id(fan_state_lbl),
            on ? lv_color_hex(0x29B6F6) : lv_color_hex(0x546E7A),
            LV_PART_MAIN | LV_STATE_DEFAULT);
          // Card border
          lv_obj_set_style_border_color(
            id(fan_card),
            on ? lv_color_hex(0x29B6F6) : lv_color_hex(0x37474F),
            LV_PART_MAIN | LV_STATE_DEFAULT);
          // Reset angle if off
          if (!on) {
            id(fan_angle) = 0;
            lv_obj_set_style_transform_angle(id(fan_icon_lbl), 0,
                                             LV_PART_MAIN | LV_STATE_DEFAULT);
          }

      # Fan speed
      - lvgl.label.update:
          id: fan_speed_lbl
          text: !lambda |-
            float v = id(ha_fan_speed).state;
            if (isnan(v)) return std::string("--%");
            char buf[10]; snprintf(buf, sizeof(buf), "%d%%", (int)v);
            return std::string(buf);