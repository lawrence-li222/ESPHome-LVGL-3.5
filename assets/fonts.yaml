  # MDI icon font – fan glyph only (keeps firmware small)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_56
    size: 56
    bpp: 4
    glyphs:
      - "\U000F0210"   # mdi:fan
      - "\U000F0211"   # mdi:fan-off  (optional)

  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_48
    size: 48
    bpp: 4
    glyphs:
      - "\U000F0599"   # mdi:weather-sunny
      - "\U000F0590"   # mdi:weather-cloudy
      - "\U000F0591"   # mdi:weather-fog
      - "\U000F0592"   # mdi:weather-hail
      - "\U000F0593"   # mdi:weather-lightning
      - "\U000F067E"   # mdi:weather-lightning-rainy
      - "\U000F0594"   # mdi:weather-night
      - "\U000F0F31"   # mdi:weather-night-partly-cloudy
      - "\U000F0595"   # mdi:weather-partly-cloudy
      - "\U000F0596"   # mdi:weather-pouring
      - "\U000F0597"   # mdi:weather-rainy
      - "\U000F0598"   # mdi:weather-snowy
      - "\U000F067F"   # mdi:weather-snowy-rainy
      - "\U000F059D"   # mdi:weather-windy
      - "\U000F059E"   # mdi:weather-windy-variant
      - "\U000F0F38"   # mdi:weather-partly-rainy
      - "\U000F0F37"   # mdi:weather-partly-lightning
      - "\U000F059B"   # mdi:weather-tornado
      - "\U000F059C"   # mdi:weather-hurricane

  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_20
    size: 20
    bpp: 4
    glyphs:
      - "\U000F058E"   # mdi:water-percent  (humidity)
      - "\U000F059D"   # mdi:weather-windy  (wind)
      - "\U000F02E3"   # mdi:thermometer    (feels-like)
      - "\U000F0D43"   # mdi:umbrella-outline (precipitation)

  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: mdi_icons
    size: 56
    glyphs:
      - "\U000F06E8"  # mdi:lightbulb-on
      - "\U000F06E9"  # mdi:lightbulb-on-outline
      - "\U000F0335"  # mdi:lightbulb
      - "\U000F0336"  # mdi:lightbulb-outline
      - "\U000F0F5E"  # mdi:lightbulb-off
      - "\U000F0F5F"  # mdi:lightbulb-off-outline
lvgl:
  style_definitions:
    - id: roboto15_style
      text_font: roboto18_font
